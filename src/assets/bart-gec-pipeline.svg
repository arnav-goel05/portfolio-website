<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Two-stage BART grammatical error correction pipeline</title>
  <desc id="description">An incorrect sentence passes through Lang-8 adaptation and gold-standard specialisation before becoming a corrected sentence.</desc>
  <rect width="1600" height="900" fill="#fff"/>

  <g fill="none" stroke="#d0d0d0" stroke-width="3">
    <path d="M406 450h138"/>
    <path d="M1016 450h138"/>
  </g>
  <g fill="#222">
    <path d="m544 450-18-11v22z"/>
    <path d="m1154 450-18-11v22z"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <text x="120" y="240" fill="#777" font-size="24" letter-spacing="3">INPUT</text>
    <rect x="120" y="278" width="286" height="344" rx="18" fill="#fafafa" stroke="#d6d6d6" stroke-width="3"/>
    <text x="166" y="400" fill="#222" font-size="36">
      <tspan x="166" dy="0">She go to</tspan>
      <tspan x="166" dy="54">school</tspan>
      <tspan x="166" dy="54">yesterday.</tspan>
    </text>
    <path d="M166 485h116" stroke="#222" stroke-width="3" stroke-dasharray="5 8"/>

    <text x="544" y="190" fill="#777" font-size="24" letter-spacing="3">BART TRAINING CURRICULUM</text>
    <rect x="544" y="228" width="472" height="444" rx="24" fill="#fafafa" stroke="#222" stroke-width="3"/>
    <rect x="598" y="286" width="364" height="126" rx="14" fill="#fff" stroke="#c9c9c9" stroke-width="3"/>
    <text x="632" y="330" fill="#777" font-size="20" letter-spacing="2">STAGE 1</text>
    <text x="632" y="378" fill="#111" font-size="30">Lang-8 adaptation</text>
    <path d="M780 412v74" stroke="#222" stroke-width="3"/>
    <path d="m780 486-11-18h22z" fill="#222"/>
    <rect x="598" y="486" width="364" height="126" rx="14" fill="#fff" stroke="#c9c9c9" stroke-width="3"/>
    <text x="632" y="530" fill="#777" font-size="20" letter-spacing="2">STAGE 2</text>
    <text x="632" y="572" fill="#111" font-size="28">NUCLE · FCE · W&amp;I</text>

    <text x="1154" y="240" fill="#777" font-size="24" letter-spacing="3">OUTPUT</text>
    <rect x="1154" y="278" width="326" height="344" rx="18" fill="#111"/>
    <text x="1200" y="400" fill="#fff" font-size="36">
      <tspan x="1200" dy="0">She went to</tspan>
      <tspan x="1200" dy="54">school</tspan>
      <tspan x="1200" dy="54">yesterday.</tspan>
    </text>
    <path d="M1200 485h172" stroke="#fff" stroke-width="3"/>

    <text x="544" y="756" fill="#777" font-size="22" letter-spacing="2">BART LARGE · BEA-2019 F0.5</text>
    <text x="544" y="826" fill="#111" font-size="48">60.04 → 67.20</text>
  </g>
</svg>
